plugins {
    id 'application'
    id 'java'
}

// The desktop UI sources follow the original Eclipse layout (everything under src/, both
// .java files and PNG resources). Map that single directory to Gradle's source set.
sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
        resources {
            srcDirs = ['src']
            // Don't ship .java files as resources.
            exclude '**/*.java'
        }
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // The two jars copied into libs/ — bundled chat client + SQLite JDBC driver.
    implementation files('libs/shared_client.jar')
    implementation files('libs/sqlite-jdbc-3.47.0.0.jar')
}

application {
    mainClass = 'com.secchat.ui.JClientMain'
}

// Make stacktraces from `./gradlew run` go to the terminal cleanly instead of being eaten by
// Gradle's worker daemon UI.
tasks.named('run', JavaExec) {
    standardInput = System.in
}
